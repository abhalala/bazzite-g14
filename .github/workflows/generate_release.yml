on:
  workflow_call:
  workflow_dispatch:
    inputs:
      handwritten:
        description: 'Small changelog about changes in this build:'
      target:
        description: 'Release Branch (e.g., testing). Defaults to branch name.'
permissions:
  contents: write
  actions: read

name: Generate Release
jobs:
  generate-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout last 500 commits (for <commits> to work)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 500

      - name: Get target
        id: get-target
        run: |
          TARGET="${{ github.event.inputs.target || github.ref }}"
          TARGET="${TARGET##*/}"
          if [ "$TARGET" = "main" ]; then
            TARGET="stable"
          fi
          echo "target=$TARGET" >> $GITHUB_OUTPUT
      
      - name: Generate Release Text
        id: generate-release
        run: |
          python3 ./.github/workflows/changelog.py \
            "${{ steps.get-target.outputs.target }}" \
            ./output.env ./changelog.md --workdir . --handwritten "${{ github.event.inputs.handwritten }}"
          source ./output.env
          echo "title=${TITLE}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Download ISO Artifacts
        id: download-isos
        continue-on-error: true
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          path: iso-artifacts
          merge-multiple: true

      - name: Log ISO Artifact Status
        run: |
          if [ "${{ steps.download-isos.outcome }}" = "success" ]; then
            echo "ISO artifacts downloaded successfully. Files to attach to release:"
            find iso-artifacts -type f | sort
          else
            echo "No ISO artifacts found (workflow may have been triggered standalone). Release will be created without ISOs."
          fi

      - name: Create Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          name: ${{ steps.generate-release.outputs.title }}
          tag_name: ${{ steps.generate-release.outputs.tag }}
          body_path: ./changelog.md
          make_latest: ${{ steps.get-target.outputs.target == 'stable' }}
          prerelease: ${{ steps.get-target.outputs.target != 'stable' }}
          files: iso-artifacts/**
